<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dr.Dow AI · Emblem (canonical)
  - viewBox 200×200, center (100,100), lozenge half-diagonal 70
  - Stroke uses currentColor so parent CSS / fill controls colour
  - Default colour: matte gold #C4B584 on transparent background
  - Designed flat (no gradients, no shadows) for sharp print + small UI
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none"
     stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Dr.Dow AI">
  <g color="#C4B584">
    <!-- outer lozenge (rotated square) -->
    <polygon points="100,30 170,100 100,170 30,100" stroke-width="1.8"/>

    <!-- four internal radiating lines from corners to centre -->
    <line x1="100" y1="30"  x2="100" y2="170" stroke-width="1.6"/>
    <line x1="30"  y1="100" x2="170" y2="100" stroke-width="1.6"/>

    <!-- centre concentric ring -->
    <circle cx="100" cy="100" r="13" stroke-width="1.3"/>

    <!-- centre solid dot -->
    <circle cx="100" cy="100" r="4.2" fill="currentColor" stroke="none"/>

    <!-- four corner dots -->
    <circle cx="100" cy="30"  r="4" fill="currentColor" stroke="none"/>
    <circle cx="170" cy="100" r="4" fill="currentColor" stroke="none"/>
    <circle cx="100" cy="170" r="4" fill="currentColor" stroke="none"/>
    <circle cx="30"  cy="100" r="4" fill="currentColor" stroke="none"/>

    <!-- four cardinal tick marks just outside each corner -->
    <line x1="100" y1="20"  x2="100" y2="14"  stroke-width="1.3"/>
    <line x1="180" y1="100" x2="186" y2="100" stroke-width="1.3"/>
    <line x1="100" y1="180" x2="100" y2="186" stroke-width="1.3"/>
    <line x1="20"  y1="100" x2="14"  y2="100" stroke-width="1.3"/>
  </g>
</svg>
